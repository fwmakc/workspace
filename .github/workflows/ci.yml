name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Check formatting
        run: cd src && cargo fmt --all -- --check

      - name: Clippy
        run: cd src && cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cd src && cargo build --all-targets

      - name: Test
        run: cd src && cargo test --all-targets

  test-report:
    name: Test Report & Coverage
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Run full test suite
        run: cd src && cargo test --all-targets --verbose

      - name: Build test runner
        run: cd tests/runners/workspace-test-runner && cargo build --release

      - name: Generate spec coverage report
        run: ./tests/runners/workspace-test-runner/target/release/w-test-runner --workspace src --specs tests --json test-report.json
        continue-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json
        continue-on-error: true

  docs:
    name: Documentation Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: '**/*.md'
          config: >
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

      - name: Check broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 --max-concurrency 1 --exclude-path archive/ .
        continue-on-error: true
