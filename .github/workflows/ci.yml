name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Ensure cargo in PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Check formatting
        run: cd src && cargo fmt --all -- --check

      - name: Clippy
        run: cd src && cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cd src && cargo build --all-targets

      - name: Test
        run: cd src && cargo test --all-targets

  android:
    name: Android Cross-Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Build host_shim (all Android targets)
        working-directory: src
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 build -p w-host-shim --lib

  test-report:
    name: Test Report & Coverage
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Run full test suite
        run: cd src && cargo test --all-targets --verbose

      - name: Build test runner
        run: cd tests/runners/workspace-test-runner && cargo build --release

      - name: Generate spec coverage report
        run: ./tests/runners/workspace-test-runner/target/release/w-test-runner --workspace src --specs tests --json test-report.json
        continue-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json
        continue-on-error: true

  docs:
    name: Documentation Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: |
            *.md
            src/**/*.md
          config: '.markdownlint.json'

      - name: Check broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 --max-concurrency 1 --exclude-path archive/ .
        continue-on-error: true
